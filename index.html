<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Hire Form</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <img src="Logos and slogan-03 5 (1).png" class="logoimg" alt="logo">
  <h2>Square Mail Registeration</h2>
  <form id="onboardingForm">

    <input type="text" id="code" placeholder="Candidate ID" required>
    <div class="error" id="codeError"></div>

    <input type="text" id="firstName" placeholder="First Name" required>
    <input type="text" id="middleName" placeholder="Middle Name" required>
    <input type="text" id="lastName" placeholder="Last Name" required>

    <input type="email" id="email" placeholder="Email" required>
    <div class="error" id="emailError"></div>

    <div class="choices">
      <div class="suggestion-wrapper">
        <button type="button" class="mailbutton" id="fl"></button>
        <span class="button-error" id="flError"></span>
      </div>

      <div class="suggestion-wrapper">
        <button type="button" class="mailbutton" id="fml"></button>
        <span class="button-error" id="fmlError"></span>
      </div>
    </div>

    <!-- <input type="text" id="phone" placeholder="Phone (01XXXXXXXXX)" required>
    <div class="error" id="phoneError"></div> -->


    <button type="submit" id="submitBtn" disabled style="margin-left: 10px;">Submit</button>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
