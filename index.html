<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Hire Form</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <img src="Logos and slogan-03 5 (1).png" class="logoimg" alt="logo">
  <h2>Square Mail Registeration</h2>
  <form id="onboardingForm">

    <input type="text" id="code" placeholder="Candidate ID" required readonly style="background-color: rgb(204, 203, 203); color: grey;">
    <div class="error" id="codeError"></div>

    <input type="text" id="firstName" placeholder="First Name" required>
    <input type="text" id="middleName" placeholder="Middle Name" required>
    <input type="text" id="lastName" placeholder="Last Name" required>

    <div class="mailchecking">
      <input type="email" id="email" placeholder="Email" required>
      <img class="loadingicon" src="icons8-loading-circle.gif" alt="loading">

    </div>
    <div class="error" id="emailError"></div>

    <div class="choices">
      <div class="suggestion-wrapper">
        <button type="button" class="mailbutton" id="fl"></button>
        <span class="button-error" id="flError"></span>
      </div>

      <div class="suggestion-wrapper">
        <button type="button" class="mailbutton" id="fml"></button>
        <span class="button-error" id="fmlError"></span>
      </div>
    </div>

    <div class="validationBox">
        <p id="rule1">▪ Email must end with @square.com.eg</p>
        <p id="rule2">▪ Email must contain first and last name in lowercase</p>
        <p id="rule3">▪ Email characters must be in lowercase</p>
        <p id="rule4">▪ Numbers are not allowed</p>
        <p id="rule5">▪ Only letters, dot(.) and dash(-) allowed</p>
    </div>
    <!-- <input type="text" id="phone" placeholder="Phone (01XXXXXXXXX)" required>
    <div class="error" id="phoneError"></div> -->


    <button type="submit" id="submitBtn" disabled>Submit</button>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
